<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PushBoss — Invite</title>
    <meta name="apple-itunes-app" content="app-id=6762020951" />

    <!-- Open Graph / link preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="push-ups vs bosses" />
    <meta property="og:description" content="AI counts your push-ups in real time. that's the game" />
    <meta property="og:image" content="https://pushboss-links.pages.dev/og/invite.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://pushboss-links.pages.dev/pushboss/invite" />
    <meta property="og:site_name" content="PushBoss" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="push-ups vs bosses" />
    <meta name="twitter:description" content="AI counts your push-ups in real time. that's the game" />
    <meta name="twitter:image" content="https://pushboss-links.pages.dev/og/invite.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 20px;
      }
      .card {
        background: white; border-radius: 24px;
        padding: 40px 30px; max-width: 360px; width: 100%;
        text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      }
      .icon {
        width: 100px; height: 100px; border-radius: 24px;
        background: #007aff; margin: 0 auto 24px;
        display: flex; align-items: center; justify-content: center;
        font-size: 48px;
      }
      h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; color: #111; }
      p { font-size: 16px; color: #666; margin-bottom: 32px; line-height: 1.5; }
      .btn {
        display: block; width: 100%; padding: 16px 24px;
        background: #007aff; color: white;
        font-size: 18px; font-weight: 700;
        border: none; border-radius: 12px;
        text-decoration: none; transition: transform 0.1s;
      }
      .btn:active { transform: scale(0.98); }
      .small { margin-top: 16px; font-size: 14px; color: #999; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">💪</div>
      <h1>PushBoss</h1>
      <p>Your friend invited you to PushBoss. Push-ups vs Bosses — AI counts every rep.</p>
      <a href="https://apps.apple.com/app/id6762020951" class="btn" id="installBtn">Install PushBoss</a>
      <p class="small">Opening app if installed…</p>
    </div>
    <script>
      var src = (window.location.hash || '') + ' ' + window.location.pathname;
      var m = src.match(/invite\/?([A-Z0-9]{4,8})?/i);
      var code = m && m[1] ? m[1].toUpperCase() : '';
      setTimeout(function () {
        window.location = 'pushboss://invite' + (code ? '/' + code : '');
      }, 250);
      setTimeout(function () {
        window.location = 'https://apps.apple.com/app/id6762020951';
      }, 1200);
    </script>
  </body>
</html>
